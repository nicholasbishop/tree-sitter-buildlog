name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test parser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: tree-sitter/setup-action/cli@v2
      - uses: tree-sitter/parser-test-action@v3
        with:
          test-rust: true
          test-node: false
          test-python: false
          test-go: false
          test-swift: false
